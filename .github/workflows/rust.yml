name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          libexpat1-dev \
          libfontconfig-dev \
          libfreetype-dev \
          libxkbcommon-dev \
          libinput-dev \
          libgbm-dev \
          libseat-dev \
          libudev-dev \
          cmake \
          pkg-config

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
